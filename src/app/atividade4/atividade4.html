<div id="formulario-cadastrar-produto">
    <label for="nome">Nome</label>
    <!--ngMOdel é uma forma de relacionar um campo com uma variável (é necessário importar FormsModule)-->>
    <input type="text" id="nome" [(ngModel)]="nome">

    <label for="preco">Preço</label>
    <input type="number" id="preco" [(ngModel)]="preco">
    
    <label for="quantidade">Quantidade</label>
    <input type="number" id="quantidade" [(ngModel)]="quantidade">

    <button (click)="calcularTotal()">Apresentar calculo Total</button>

    <p>O produto {{nome()}} tem como valor total {{resultado()}}</p>
</div>

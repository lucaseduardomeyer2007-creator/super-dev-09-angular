<div id="pedido-pizzaria">
    <label for="nome">Nome do cliente:</label>
    <input type="text" id="nome" [(ngModel)]="nome">

    <label for="tamanho">Tamanho da pizza:</label>
    <select id="tamanho" [(ngModel)]="tamanho">
        <option value="">Selecione...</option>
        <option value="pequena">Pequena</option>
        <option value="media">Média</option>
        <option value="grande">Grande</option>
    </select>

    <label for="quantidade">Quantidade:</label>
    <input type="number" id="quantidade" [(ngModel)]="quantidade">

    <div>
        <input type="checkbox" id="borda" [(ngModel)]="bordaRecheada">
        <label for="borda">Borda recheada</label>
    </div>

    <button (click)="calcularPedido()">Calcular Pedido</button>

    <p> Resumo do pedido: {{ resumo() }}</p>
</div>

<div id="formulario-nome-completo">
    <label for="nome">Nome</label>
    <!--ngMOdel é uma forma de relacionar um campo com uma variável (é necessário importar FormsModule)-->>
    <input type="text" id="nome" [(ngModel)]="nome">

    <label for="sobrenome">Sobrenome</label>
    <input type="text" id="sobrenome" [(ngModel)]="sobrenome">
    
    <label for="idade">Idade</label>
    <input type="number" id="idade" [(ngModel)]="idade">

    <button (click)="apresentarNomeCompleto()">Apresentar nome completo</button>

</div>

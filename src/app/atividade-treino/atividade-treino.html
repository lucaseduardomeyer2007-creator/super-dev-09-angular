<div id="formulario-teste">
<label for="nome">Nome</label>
<input type="text" id="nome" [(ngModel)]="nome">

<label for="sobrenome">Sobrenome</label>
<input type="text" id="sobrenome" [(ngModel)]="sobrenome">


<label for="idade">Idade</label>
<input type="number" id="idade" [(ngModel)]="idade">


<select id="escolha" [(ngModel)]="escolha">
<option value="">Selecione</option>
<option value="iphone">Iphone</option>
<option value="android">Android</option>
<option value="xiaomi">Xiaomi</option>
</select>

<button (click)="fazerViagem()">Encomendar Viagem</button>

</div>>
